services:
  - type: web
    name: fleetops-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: cd apps/api && npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
