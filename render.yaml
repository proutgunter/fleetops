# render.yaml — configuration de déploiement Render
# Render détecte ce fichier et configure le service automatiquement.

services:
  - type: web
    name: fleetops-api
    runtime: node
    plan: free
    buildCommand: npm install && cd apps/api && npx prisma generate && npm run build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false  # À renseigner manuellement (URL Neon)
      - key: JWT_SECRET
        generateValue: true  # Render génère une clé aléatoire
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000  # Port par défaut Render
      - key: FRONTEND_URL
        sync: false  # URL Vercel à renseigner
